<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Post - HOTTS NEWS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-protected="true">
  <main class="dashboard-wrap">
    <aside class="dashboard-sidebar">
      <a href="index.html" class="logo">
        <div class="logo-icon">HN</div>
        <div class="logo-text"><span class="hotts">HOTTS</span> <span class="news">NEWS</span></div>
      </a>

      <nav class="dashboard-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="create-post.html">Create Post</a>
        <a href="posts.html">All Posts</a>
        <a href="settings.html">Settings</a>
        <a href="index.html">View Site</a>
        <a href="#" id="logoutBtn">Logout</a>
      </nav>
    </aside>

    <section class="dashboard-main">
      <div class="page-hero">
        <span class="tag">Admin</span>
        <h1>Create Post</h1>
        <p>Use this form to create your daily news posts.</p>
      </div>

      <section class="form-card">
        <form class="post-form" id="postForm">
          <label>Post Title</label>
          <input type="text" name="title" placeholder="Enter post title" required />

          <label>Category</label>
          <select name="category" required>
            <option value="">Select category</option>
            <option>Football</option>
            <option>Betting</option>
            <option>Players</option>
            <option>Trending</option>
            <option>General News</option>
          </select>

          <label>Image URL</label>
          <input type="text" name="image" placeholder="Paste image URL" />

          <label>External Link (optional)</label>
          <input type="text" name="externalLink" placeholder="https://example.com" />

          <label>Short Description</label>
          <textarea name="description" rows="4" placeholder="Enter short description" required></textarea>

          <label>Full Content</label>
          <textarea name="content" rows="10" placeholder="Write full post content here" required></textarea>

          <button type="submit">Publish Post</button>
        </form>

        <p id="postMessage"></p>
      </section>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
