<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - HOTTS NEWS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-protected="true">
  <main class="dashboard-wrap">
    <aside class="dashboard-sidebar">
      <div class="logo">
        <div class="logo-icon">HN</div>
        <div class="logo-text"><span class="hotts">HOTTS</span> <span class="news">NEWS</span></div>
      </div>

      <nav class="dashboard-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="create-post.html">Create Post</a>
        <a href="posts.html">All Posts</a>
        <a href="settings.html">Settings</a>
        <a href="index.html">View Site</a>
        <a href="#" id="logoutBtn">Logout</a>
      </nav>
    </aside>

    <section class="dashboard-main">
      <div class="page-hero">
        <span class="tag">Admin</span>
        <h1>Settings</h1>
        <p>Manage your website links and future verification settings here.</p>
      </div>

      <section class="form-card">
        <form class="post-form" id="settingsForm">
          <label>Telegram Link</label>
          <input type="text" name="telegram" id="telegramField" placeholder="https://t.me/yourchannel" />

          <label>YouTube Link</label>
          <input type="text" name="youtube" id="youtubeField" placeholder="https://youtube.com/@yourchannel" />

          <label>Google Verification Code</label>
          <textarea name="googleVerification" id="googleVerificationField" rows="4" placeholder="Paste verification meta code here later"></textarea>

          <button type="submit">Save Settings</button>
        </form>

        <p id="settingsMessage"></p>
      </section>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
