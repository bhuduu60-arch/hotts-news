<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard - HOTTS NEWS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="logo">
      <div class="logo-icon">HN</div>
      <div class="logo-text"><span class="hotts">HOTTS</span> <span class="news">NEWS</span></div>
    </a>

    <button id="memberLogoutBtn" class="external-link-btn">Logout</button>
  </header>

  <main>
    <section class="page-hero">
      <span class="tag">Member</span>
      <h1>Your Earnings Dashboard</h1>
      <p>Track your progress and points here.</p>
    </section>

    <div class="dashboard-grid">
      <div class="dashboard-box analytics-green">
        <h3>Total Points</h3>
        <p id="userPoints">0</p>
      </div>
      <div class="dashboard-box analytics-red">
        <h3>Status</h3>
        <p>Active</p>
      </div>
    </div>

    <section class="form-card analytics-section">
      <h2>Daily Tasks</h2>
      <button id="dailyCheckinBtn" class="external-link-btn">Daily Check-in (+1 point)</button>
      <p id="dailyCheckinMessage" style="margin-top:12px;"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 HOTTS NEWS. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
