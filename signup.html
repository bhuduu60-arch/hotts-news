<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - HOTTS NEWS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="logo">
      <div class="logo-icon">HN</div>
      <div class="logo-text"><span class="hotts">HOTTS</span> <span class="news">NEWS</span></div>
    </a>
  </header>

  <main>
    <section class="page-hero">
      <span class="tag">Signup</span>
      <h1>Create Your Member Account</h1>
      <p>Complete signup after application approval.</p>
    </section>

    <section class="form-card">
      <form class="post-form" id="signupForm">
        <label>Email</label>
        <input type="email" name="email" required />

        <label>Password</label>
        <input type="password" name="password" required />

        <button type="submit">Sign Up</button>
      </form>
      <p id="signupMessage"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 HOTTS NEWS. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
