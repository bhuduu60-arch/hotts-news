<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - HOTTS NEWS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-protected="true">
  <main class="dashboard-wrap">
    <aside class="dashboard-sidebar">
      <div class="logo">
        <div class="logo-icon">HN</div>
        <div class="logo-text"><span class="hotts">HOTTS</span> <span class="news">NEWS</span></div>
      </div>

      <nav class="dashboard-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="create-post.html">Create Post</a>
        <a href="posts.html">All Posts</a>
        <a href="search.html">Search</a>
        <a href="index.html">View Site</a>
        <a href="#" id="logoutBtn">Logout</a>
      </nav>
    </aside>

    <section class="dashboard-main">
      <div class="page-hero">
        <span class="tag">Admin</span>
        <h1>Dashboard</h1>
        <p>Welcome to your HOTTS NEWS admin dashboard.</p>
      </div>

      <div class="dashboard-grid">
        <div class="dashboard-box">
          <h3>Total Posts</h3>
          <p>0</p>
        </div>
        <div class="dashboard-box">
          <h3>Categories</h3>
          <p>5</p>
        </div>
        <div class="dashboard-box">
          <h3>Featured Posts</h3>
          <p>0</p>
        </div>
        <div class="dashboard-box">
          <h3>Drafts</h3>
          <p>0</p>
        </div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
