<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join & Earn - HOTTS NEWS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="logo">
      <div class="logo-icon">HN</div>
      <div class="logo-text"><span class="hotts">HOTTS</span> <span class="news">NEWS</span></div>
    </a>
  </header>

  <main>
    <section class="page-hero">
      <span class="tag">Earn</span>
      <h1>Join HOTTS NEWS Monetization</h1>
      <p>Apply to join our lightweight earning program.</p>
    </section>

    <section class="form-card">
      <form class="post-form" id="applyForm">
        <label>Full Name</label>
        <input type="text" name="fullName" required />

        <label>Email</label>
        <input type="email" name="email" required />

        <label>Country</label>
        <input type="text" name="country" required />

        <label>WhatsApp / Telegram (optional)</label>
        <input type="text" name="contact" />

        <button type="submit">Apply Now</button>
      </form>

      <p id="applyMessage"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 HOTTS NEWS. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
