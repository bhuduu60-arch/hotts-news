<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - HOTTS NEWS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="admin-wrap">
    <section class="admin-card">
      <div class="logo admin-logo">
        <div class="logo-icon">HN</div>
        <div class="logo-text"><span class="hotts">HOTTS</span> <span class="news">NEWS</span></div>
      </div>

      <span class="tag">Admin</span>
      <h1>Admin Login</h1>
      <p>Secure access for HOTTS NEWS posting dashboard.</p>

      <form class="admin-form">
        <input type="text" placeholder="Username" />
        <input type="password" placeholder="Password" />
        <button type="submit">Login</button>
      </form>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
